      - dt-dc-rrel-rig-ubuntu24
      - dm-dt-dc-rrel-rig-ubuntu24
      - pkgcache-dt-dc-rrel-rig-ubuntu24
    steps:
      - name: All image builds passed
        if: ${{ !(contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: echo "All image build jobs completed successfully."
      - name: Fail if any image build failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more image build jobs failed or were cancelled."
          exit 1
