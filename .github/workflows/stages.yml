      - name: Download image ubuntu24-rig-rrel-dc-dt
        uses: actions/download-artifact@v4
        with:
          name: img-ubuntu24-rig-rrel-dc-dt
          path: /tmp/img-in
      - name: Load image ubuntu24-rig-rrel-dc-dt
        run: docker load --input /tmp/img-in/ubuntu24-rig-rrel-dc-dt.tar
      - name: Build ubuntu24-rig-rrel-dc-dt-pkgcache
        run: |
          date -Idate | tee ubuntu24/rig/rrel/dc/dt/pkgcache/date.txt
          docker build --build-arg TARGETARCH=amd64 \
            --tag "$REGISTRY/$REPO_NAME/ubuntu24-rig-rrel-dc-dt-pkgcache:latest-amd64" \
            --tag "$REGISTRY/$REPO_NAME/ubuntu24-rig-rrel-dc-dt-pkgcache:latest" \
            ubuntu24/rig/rrel/dc/dt/pkgcache

  ci:
    name: CI
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs:
      - alma9
      - rig-alma9
      - rrel-rig-alma9
      - coinor-rrel-rig-alma9
      - clang18-duckdb
      - forky
      - gcc-forky
      - rig-gcc-forky
      - rdev-rig-gcc-forky
      - duckdb-rdev-rig-gcc-forky
      - p3m-bookworm
      - p3m-bookworm-rbuild
      - p3m-centos7
      - p3m-jammy
      - p3m-manylinux
      - p3m-noble
      - p3m-opensuse
      - p3m-resolute
      - p3m-rhel10
      - p3m-rhel10-rbuild
      - p3m-rhel8
      - p3m-rhel9
      - p3m-trixie
      - r-minimal
      - rchk-igraph
      - rig-debian
      - rig-rocky8
      - rig-ubuntu
      - dbi-rig-ubuntu
      - dm-rig-ubuntu
      - duckdb-rig-ubuntu
      - dev-duckdb-rig-ubuntu
      - duckdb4-rig-ubuntu
      - igraph-rig-ubuntu
      - r-postgres-rig-ubuntu
      - revdepcheck-rig-ubuntu
      - ubuntu24
