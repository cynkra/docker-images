            ["ubuntu24"]=""
            ["ubuntu24-msfonts"]="ubuntu24"
            ["ubuntu24-pak"]="ubuntu24"
            ["ubuntu24-pak-rlang"]="ubuntu24-pak"
            ["ubuntu24-pak-rlang2"]="ubuntu24-pak"
            ["ubuntu24-rig"]="ubuntu24"
            ["ubuntu24-rig-rdev"]="ubuntu24-rig"
            ["ubuntu24-rig-rdev-dc"]="ubuntu24-rig-rdev"
            ["ubuntu24-rig-rdev-dc-dt"]="ubuntu24-rig-rdev-dc"
            ["ubuntu24-rig-rdev-gcc14"]="ubuntu24-rig-rdev"
            ["ubuntu24-rig-rdev-gcc14-duckdb"]="ubuntu24-rig-rdev-gcc14"
            ["ubuntu24-rig-rrel"]="ubuntu24-rig"
            ["ubuntu24-rig-rrel-dc"]="ubuntu24-rig-rrel"
            ["ubuntu24-rig-rrel-dc-dt"]="ubuntu24-rig-rrel-dc"
            ["ubuntu24-rig-rrel-dc-dt-dm"]="ubuntu24-rig-rrel-dc-dt"
            ["ubuntu24-rig-rrel-dc-dt-pkgcache"]="ubuntu24-rig-rrel-dc-dt"
          )
          ALL_IMAGES=(
            alma9
            alma9-rig
            alma9-rig-rrel
            alma9-rig-rrel-coinor
            clang18-duckdb
            forky
            forky-gcc
            forky-gcc-rig
            forky-gcc-rig-rdev
            forky-gcc-rig-rdev-duckdb
            p3m-bookworm
            p3m-bookworm-duckdb
            p3m-bookworm-rbuild
            p3m-centos7
            p3m-jammy
            p3m-jammy-duckdb
            p3m-manylinux
            p3m-manylinux-duckdb
            p3m-noble
            p3m-noble-duckdb
            p3m-opensuse
            p3m-opensuse-duckdb
            p3m-resolute
            p3m-resolute-duckdb
            p3m-rhel10
            p3m-rhel10-duckdb
            p3m-rhel10-rbuild
            p3m-rhel8
            p3m-rhel8-duckdb
            p3m-rhel9
            p3m-rhel9-duckdb
            p3m-trixie
            p3m-trixie-duckdb
            r-minimal
            rchk-igraph
            rig-debian
            rig-rocky8
            rig-ubuntu
            rig-ubuntu-dbi
            rig-ubuntu-dm
            rig-ubuntu-duckdb
            rig-ubuntu-duckdb-dev
            rig-ubuntu-duckdb4
            rig-ubuntu-igraph
            rig-ubuntu-r-postgres
            rig-ubuntu-revdepcheck
            ubuntu24
            ubuntu24-msfonts
            ubuntu24-pak
            ubuntu24-pak-rlang
            ubuntu24-pak-rlang2
            ubuntu24-rig
            ubuntu24-rig-rdev
            ubuntu24-rig-rdev-dc
            ubuntu24-rig-rdev-dc-dt
            ubuntu24-rig-rdev-gcc14
            ubuntu24-rig-rdev-gcc14-duckdb
            ubuntu24-rig-rrel
            ubuntu24-rig-rrel-dc
            ubuntu24-rig-rrel-dc-dt
            ubuntu24-rig-rrel-dc-dt-dm
            ubuntu24-rig-rrel-dc-dt-pkgcache
          )
          # Echo the image whose directory is the longest matching prefix of $1.
          image_for_path() {
            local path="$1" best="" bestlen=0 img d
            for img in "${ALL_IMAGES[@]}"; do
              d="${PATHS[$img]}"
              if [ "$path" = "$d" ] || [ "${path#"$d"/}" != "$path" ]; then
                if [ "${#d}" -gt "$bestlen" ]; then best="$img"; bestlen="${#d}"; fi
              fi
            done
            printf '%s' "$best"
          }

          # 1. Map changed files to the images that own them (the seed).
          declare -A seed=()
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            img="$(image_for_path "$f")"
            [ -n "$img" ] && seed["$img"]=1
          done < <(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")

          # 2. Reverse adjacency: dependency -> its direct dependents.
          declare -A rdeps=()
          for img in "${ALL_IMAGES[@]}"; do
            for dep in ${DEPS[$img]:-}; do
              rdeps["$dep"]="${rdeps[$dep]:-} ${img}"
            done
          done

          # 3. Transitive downstream closure of the seed.
          declare -A inset=()
          worklist=()
          for img in "${!seed[@]}"; do inset["$img"]=1; worklist+=("$img"); done
          while [ "${#worklist[@]}" -gt 0 ]; do
            cur="${worklist[0]}"; worklist=("${worklist[@]:1}")
            for d in ${rdeps["$cur"]:-}; do
              [ -n "${inset[$d]:-}" ] || { inset["$d"]=1; worklist+=("$d"); }
            done
          done

          # 4. Emit the plan as a JSON array (image names are [A-Za-z0-9-]; no escaping).
          plan="["
          sep=""
          for img in "${ALL_IMAGES[@]}"; do
            if [ -n "${inset[$img]:-}" ]; then
              plan="${plan}${sep}\"${img}\""
              sep=","
            fi
          done
          plan="${plan}]"

          echo "Changed images: ${!seed[*]}"
          echo "Build plan (changed + downstream): ${plan}"
          echo "plan=${plan}" >> "$GITHUB_OUTPUT"

  alma9:
    name: alma9
    needs: [detect]
    if: ${{ !cancelled() && needs.detect.result == 'success' && contains(fromJSON(needs.detect.outputs.plan), 'alma9') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build alma9
        run: |
          date -Idate | tee alma9/date.txt
          docker build --build-arg TARGETARCH=amd64 \
            --tag "$REGISTRY/$REPO_NAME/alma9:latest-amd64" \
            --tag "$REGISTRY/$REPO_NAME/alma9:latest" \
            alma9
      - name: Save alma9
        run: |
          mkdir -p /tmp/img-out
          docker save --output /tmp/img-out/alma9.tar \
            "$REGISTRY/$REPO_NAME/alma9:latest-amd64" "$REGISTRY/$REPO_NAME/alma9:latest"
      - name: Upload alma9
        uses: actions/upload-artifact@v4
        with:
          name: img-alma9
          path: /tmp/img-out/alma9.tar
          retention-days: 1

