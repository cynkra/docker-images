            ["forky-gcc-rig-rdev-duckdb"]="forky-gcc-rig-rdev"
            ["p3m-bookworm"]="p3m-bookworm-rbuild"
            ["p3m-bookworm-duckdb"]="p3m-bookworm"
            ["p3m-bookworm-rbuild"]=""
            ["p3m-centos7"]=""
            ["p3m-jammy"]=""
            ["p3m-jammy-duckdb"]="p3m-jammy"
