# Generated by generate_stages.py, do not edit by hand
# Run 'make stages' to regenerate this file
#
# Pull-request CI: a `detect` pre-step computes the build plan (the images
# changed in this PR plus their transitive downstream dependents); each image
# job runs only if it is in the plan and is otherwise SKIPPED. In-plan images
# build in parallel (ordered by `needs`) and are handed to dependents as
# artifacts (docker save + upload-artifact -> download-artifact + docker load);
# an unchanged dependency is pulled from the registry instead. Nothing is
# pushed to any registry. Builds the native amd64 arch only; full multi-arch
# build + publish happens on main via push.yml.
#
# The final `CI` job is the required status check for auto-merge
# (see github-docker/rulesets/auto-merge.json, context "CI").
name: CI

on:
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.repository }}

jobs:

  detect:
    name: detect
    runs-on: ubuntu-24.04
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute build plan (changed images + downstream)
        id: plan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # --- Baked dependency graph (generated) ---
          declare -A PATHS=(
            ["alma9"]="alma9"
            ["alma9-rig"]="alma9/rig"
            ["alma9-rig-rrel"]="alma9/rig/rrel"
