# Generated by generate_stages.py (copied verbatim from github-docker/pr-stages.yml)
# Do not edit by hand; edit github-docker/pr-stages.yml and run 'make stages'.
#
# Pull-request CI. Builds the changed images and all their downstream
# dependents locally, in dependency order, WITHOUT pushing to any registry
# (see .github/build-pr-images.sh). Each image is built into the local docker
# image store and tagged with its registry references, so a dependent's
# FROM / COPY --from resolves against the just-built local image; unchanged
# upstream dependencies are pulled from the registry.
#
# The per-image build+push workflow lives in push.yml and runs only on
# push/schedule (never on pull_request — PRs never push).
#
# This workflow's single "CI" job is the required status check for auto-merge
# (see github-docker/rulesets/auto-merge.json, context "CI"). This file is
# static (repo-agnostic) and copied verbatim into each repo.
name: CI

on:
  pull_request:
    branches:
      - main

env:
  REPO_NAME: ${{ github.repository }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to the Container registry
        # Needed to pull unchanged upstream images (published on main) that a
        # changed image builds FROM / COPY --from. Nothing is pushed.
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build changed images and downstream dependents (no push)
        run: bash .github/build-pr-images.sh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
