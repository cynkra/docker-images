            ["p3m-rhel8"]=""
            ["p3m-rhel8-duckdb"]="p3m-rhel8"
            ["p3m-rhel9"]=""
            ["p3m-rhel9-duckdb"]="p3m-rhel9"
            ["p3m-trixie"]=""
            ["p3m-trixie-duckdb"]="p3m-trixie"
            ["r-minimal"]=""
            ["rchk-igraph"]=""
            ["rig-debian"]=""
            ["rig-rocky8"]=""
            ["rig-ubuntu"]=""
            ["rig-ubuntu-dbi"]="rig-ubuntu"
            ["rig-ubuntu-dm"]="rig-ubuntu"
            ["rig-ubuntu-duckdb"]="rig-ubuntu"
            ["rig-ubuntu-duckdb-dev"]="rig-ubuntu-duckdb"
            ["rig-ubuntu-duckdb4"]="rig-ubuntu"
            ["rig-ubuntu-igraph"]="rig-ubuntu"
            ["rig-ubuntu-r-postgres"]="rig-ubuntu"
