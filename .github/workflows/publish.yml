# Generated from github-docker/publish.yml.j2, do not edit by hand
# Run 'make publish-yml' to regenerate this file
# Called by stages.yml which is generated by generate_stages.py
# This workflow builds and publishes Docker images to GitHub Container Registry and Docker Hub.
on:
  workflow_call:
    inputs:
      path:
        required: true
        type: string
      image_name:
        required: true
        type: string
      architectures:
        required: true
        type: string
      push_on_pr:
        # Opt-in: push this image to the registry even on pull_request builds.
        # Needed for base/build-stage images that other images consume, so the
        # dependents can pull them within the same PR. Off by default, so normal
        # images stay push-on-main-only.
        required: false
        type: boolean
        default: false
    secrets:
      # Optional: only used for push/schedule runs (not pull_request).
      # Fork PRs do not have access to these secrets.
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

env:
  REPO_NAME: ${{ github.repository }}

jobs:
  img:
    runs-on: ubuntu-24.04${{ matrix.arch == 'arm64' && '-arm' || '' }}
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    # Expose Docker Hub credentials as env so steps can check availability in `if:`
    # (the `secrets` context is not allowed in step-level `if` conditions).
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(inputs.architectures) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        # Only when we actually publish to Docker Hub (main/arm). We never push
        # to Docker Hub on pull_request — not even for push_on_pr images, which
        # go to GHCR only — so logging in on a PR is pointless and just adds a
        # flaky failure point (docker.io login timeouts). Also skipped when
        # credentials are missing (e.g. fork PRs).
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/arm') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # setup buildx is needed to use cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Write date file
        run: |
          date -Idate | tee ${{ inputs.path }}/date.txt
        shell: bash

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.path }}
          platforms: linux/${{ matrix.arch }}
          pull: true
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/arm' || inputs.push_on_pr }}
          # GHCR is always tagged (it backs the internal image DAG, so
          # push_on_pr images must land there for dependents to COPY --from).
          # The Docker Hub tag is added only on main/arm — we never push to
          # Docker Hub on a PR. build-push-action drops the empty line.
          tags: |
            ghcr.io/${{ env.REPO_NAME }}/${{ inputs.image_name }}:latest-${{ matrix.arch }}
            ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/arm') && format('{0}/{1}:latest-{2}', github.repository_owner, inputs.image_name, matrix.arch) || '' }}
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_NAME }}/${{ inputs.image_name }}:latest-${{ matrix.arch }}
          cache-to: type=inline
          build-args: |
            TARGETARCH=${{ matrix.arch }}

      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see "[AUTOTITLE](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds)."
      # We can use that to get from the image to the source code that was used to build it.
      - name: Generate artifact attestation for GitHub Container Registry
        uses: actions/attest-build-provenance@v1
        # Only on main branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/arm'
        with:
          subject-name: ghcr.io/${{ env.REPO_NAME }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation for Docker Hub
        uses: actions/attest-build-provenance@v1
        # Only on main branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/arm'
        with:
          subject-name: docker.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  manifest:
    needs: img
    runs-on: ubuntu-24.04
    # Only on main branch
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/arm'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest for GitHub Container Registry
        run: |
          ARCHS='${{ inputs.architectures }}'
          IMAGES=""
          for arch in $(echo $ARCHS | jq -r '.[]'); do
            IMAGES="$IMAGES ghcr.io/${{ env.REPO_NAME }}/${{ inputs.image_name }}:latest-$arch"
          done
          docker buildx imagetools create -t ghcr.io/${{ env.REPO_NAME }}/${{ inputs.image_name }}:latest $IMAGES

      - name: Create and push manifest for Docker Hub
        run: |
          ARCHS='${{ inputs.architectures }}'
          IMAGES=""
          for arch in $(echo $ARCHS | jq -r '.[]'); do
            IMAGES="$IMAGES ${{ github.repository_owner }}/${{ inputs.image_name }}:latest-$arch"
          done
          docker buildx imagetools create -t ${{ github.repository_owner }}/${{ inputs.image_name }}:latest $IMAGES
